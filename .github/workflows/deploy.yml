name: Deploy to Google Cloud Run

on:
  push:
    branches: [ main ]

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  REGION: us-central1
  SERVICE_NAME: receipt-tracker-backend
  CLOUDSQL_INSTANCE: receipt-tracker-jt:us-central1:receipt-tracker-db

jobs:
  test:
    name: Run backend tests
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"
        cache: "pip"
        cache-dependency-path: backend/requirements.txt

    - name: Install dependencies
      run: pip install -r backend/requirements.txt

    - name: Run tests
      working-directory: backend
      env:
        ENVIRONMENT: local
        FIREBASE_PROJECT_ID: mock-receipts-project
        DATABASE_URL: postgresql+asyncpg://mock:mock@localhost/mock
        GMAIL_CLIENT_ID: mock-client-id
        GMAIL_CLIENT_SECRET: mock-client-secret
        GMAIL_REFRESH_TOKEN: mock-refresh-token
      run: python -m pytest tests/ -v --tb=short

  deploy:
    name: Deploy to Cloud Run
    needs: test
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Google Auth
      uses: google-github-actions/auth@v2
      with:
        credentials_json: ${{ secrets.GCP_SA_KEY }}

    - name: Set up Cloud SDK
      uses: google-github-actions/setup-gcloud@v2

    - name: Configure Docker for GCP
      run: gcloud auth configure-docker --quiet

    - name: Build and Push Container
      run: |
        docker build -t gcr.io/$PROJECT_ID/$SERVICE_NAME:${{ github.sha }} ./backend
        docker push gcr.io/$PROJECT_ID/$SERVICE_NAME:${{ github.sha }}

    - name: Write env vars file
      run: |
        cat > /tmp/env-vars.yaml <<EOF
        ENVIRONMENT: "production"
        GCP_PROJECT_ID: "${{ secrets.GCP_PROJECT_ID }}"
        GCS_BUCKET_NAME: "${{ secrets.GCS_BUCKET_NAME }}"
        FIREBASE_PROJECT_ID: "${{ secrets.FIREBASE_PROJECT_ID }}"
        GMAIL_CLIENT_ID: "${{ secrets.GMAIL_CLIENT_ID }}"
        GMAIL_CLIENT_SECRET: "${{ secrets.GMAIL_CLIENT_SECRET }}"
        GMAIL_REFRESH_TOKEN: "${{ secrets.GMAIL_REFRESH_TOKEN }}"
        GMAIL_ADDRESS: "jamestinsley.receipts@gmail.com"
        ANTHROPIC_API_KEY: "${{ secrets.ANTHROPIC_API_KEY }}"
        DATABASE_URL: "${{ secrets.DATABASE_URL }}"
        EOF

    - name: Run Alembic migrations
      run: |
        gcloud run jobs update alembic-migrate \
          --image gcr.io/$PROJECT_ID/$SERVICE_NAME:${{ github.sha }} \
          --region $REGION \
          --set-cloudsql-instances $CLOUDSQL_INSTANCE \
          --env-vars-file /tmp/env-vars.yaml || \
        gcloud run jobs create alembic-migrate \
          --image gcr.io/$PROJECT_ID/$SERVICE_NAME:${{ github.sha }} \
          --region $REGION \
          --command alembic \
          --args upgrade,head \
          --set-cloudsql-instances $CLOUDSQL_INSTANCE \
          --env-vars-file /tmp/env-vars.yaml \
          --max-retries 1
        gcloud run jobs execute alembic-migrate --region $REGION --wait

    - name: Deploy Backend to Cloud Run
      run: |
        gcloud run deploy $SERVICE_NAME \
          --image gcr.io/$PROJECT_ID/$SERVICE_NAME:${{ github.sha }} \
          --region $REGION \
          --platform managed \
          --allow-unauthenticated \
          --add-cloudsql-instances $CLOUDSQL_INSTANCE \
          --env-vars-file /tmp/env-vars.yaml \
          --min-instances=1

    - name: Build and Push Frontend Container
      run: |
        docker build -t gcr.io/$PROJECT_ID/receipt-tracker-frontend:${{ github.sha }} ./frontend
        docker push gcr.io/$PROJECT_ID/receipt-tracker-frontend:${{ github.sha }}

    - name: Deploy Frontend to Cloud Run
      run: |
        gcloud run deploy receipt-tracker-frontend \
          --image gcr.io/$PROJECT_ID/receipt-tracker-frontend:${{ github.sha }} \
          --region $REGION \
          --platform managed \
          --allow-unauthenticated \
          --min-instances=1
