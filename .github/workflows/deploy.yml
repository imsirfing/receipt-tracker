name: Deploy to Google Cloud Run

on:
  push:
    branches: [ main ]

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  REGION: us-central1
  SERVICE_NAME: receipt-tracker-backend
  CLOUDSQL_INSTANCE: receipt-tracker-jt:us-central1:receipt-tracker-db

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Google Auth
      uses: google-github-actions/auth@v2
      with:
        credentials_json: ${{ secrets.GCP_SA_KEY }}

    - name: Set up Cloud SDK
      uses: google-github-actions/setup-gcloud@v2

    - name: Configure Docker for GCP
      run: gcloud auth configure-docker --quiet

    - name: Build and Push Container
      run: |
        docker build -t gcr.io/$PROJECT_ID/$SERVICE_NAME:${{ github.sha }} ./backend
        docker push gcr.io/$PROJECT_ID/$SERVICE_NAME:${{ github.sha }}

    - name: Write env vars file
      run: |
        cat > /tmp/env-vars.yaml <<EOF
        ENVIRONMENT: "production"
        GCP_PROJECT_ID: "${{ secrets.GCP_PROJECT_ID }}"
        GCS_BUCKET_NAME: "${{ secrets.GCS_BUCKET_NAME }}"
        FIREBASE_PROJECT_ID: "${{ secrets.FIREBASE_PROJECT_ID }}"
        GMAIL_CLIENT_ID: "${{ secrets.GMAIL_CLIENT_ID }}"
        GMAIL_CLIENT_SECRET: "${{ secrets.GMAIL_CLIENT_SECRET }}"
        GMAIL_REFRESH_TOKEN: "${{ secrets.GMAIL_REFRESH_TOKEN }}"
        GMAIL_ADDRESS: "jamestinsley.receipts@gmail.com"
        ANTHROPIC_API_KEY: "${{ secrets.ANTHROPIC_API_KEY }}"
        DATABASE_URL: "${{ secrets.DATABASE_URL }}"
        EOF

    - name: Deploy to Cloud Run
      run: |
        gcloud run deploy $SERVICE_NAME \
          --image gcr.io/$PROJECT_ID/$SERVICE_NAME:${{ github.sha }} \
          --region $REGION \
          --platform managed \
          --allow-unauthenticated \
          --add-cloudsql-instances $CLOUDSQL_INSTANCE \
          --env-vars-file /tmp/env-vars.yaml
