version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: receipt_tracker_db
    environment:
      POSTGRES_DB: receipt_db
      POSTGRES_USER: receipt_user
      POSTGRES_PASSWORD: receipt_password
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U receipt_user -d receipt_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: receipt_tracker_backend
    volumes:
      - ./backend:/app
    ports:
      - "8080:8080"
    environment:
      - DATABASE_URL=postgresql+asyncpg://receipt_user:receipt_password@postgres:5432/receipt_db
      - ENVIRONMENT=local
      - GOOGLE_APPLICATION_CREDENTIALS=/app/gcp-creds.json
      - ANTHROPIC_API_KEY=mock_key_for_local_testing
      - FIREBASE_PROJECT_ID=mock-receipts-project
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
